  <!-- Lightbox -->
  <div id="lightbox">
    <div id="lb-overlay"></div>
    <button id="lb-close">&#215;</button>
    <button id="lb-prev">&#8249;</button>
    <button id="lb-next">&#8250;</button>
    <img id="lb-img" src="" alt="">
  </div>

  <script>
    (function () {
      var lb      = document.getElementById('lightbox');
      var lbImg   = document.getElementById('lb-img');
      var lbClose = document.getElementById('lb-close');
      var lbPrev  = document.getElementById('lb-prev');
      var lbNext  = document.getElementById('lb-next');

      var galleries = {};
      document.querySelectorAll('.lb-trigger').forEach(function (img) {
        var g = img.dataset.gallery;
        if (!galleries[g]) galleries[g] = [];
        galleries[g].push(img);
      });

      var currentGallery = [];
      var currentIndex   = 0;

      function open(gallery, index) {
        currentGallery = gallery;
        currentIndex   = index;
        lbImg.src      = currentGallery[currentIndex].src;
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }

      function close() {
        lb.style.display = 'none';
        document.body.style.overflow = '';
        lbImg.src = '';
      }

      function step(dir) {
        currentIndex = (currentIndex + dir + currentGallery.length) % currentGallery.length;
        lbImg.src    = currentGallery[currentIndex].src;
      }

      Object.keys(galleries).forEach(function (key) {
        galleries[key].forEach(function (img, i) {
          img.addEventListener('click', function () { open(galleries[key], i); });
        });
      });

      document.getElementById('lb-overlay').addEventListener('click', close);
      lbClose.addEventListener('click', close);
      lbPrev.addEventListener('click', function () { step(-1); });
      lbNext.addEventListener('click', function () { step(1); });

      document.addEventListener('keydown', function (e) {
        if (lb.style.display !== 'flex') return;
        if (e.key === 'Escape')      close();
        if (e.key === 'ArrowLeft')   step(-1);
        if (e.key === 'ArrowRight')  step(1);
      });
    })();

    // ── Scroll reveal ──
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.project-section').forEach(function (el) {
        el.classList.add('reveal');
        io.observe(el);
      });
    })();

    // ── Sticky nav ──
    (function () {
      var stickyNav = document.getElementById('sticky-nav');
      var nav = document.querySelector('nav');
      if (!stickyNav || !nav) return;
      var io = new IntersectionObserver(function (entries) {
        stickyNav.classList.toggle('is-visible', !entries[0].isIntersecting);
      }, { threshold: 0 });
      io.observe(nav);
    })();
  </script>

</body>
</html>
